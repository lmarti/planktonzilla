# Example Configuration for OOD Detection Experiments

# Model Configuration
model:
  backbone: "timm-eva02-large-m38m"  # Options: resnet18, vit-base, beit-base, timm-eva02-large-m38m
  device: "cuda"  # Options: cuda, cpu
  num_id_classes: 385 # Number of ID classes in the trained classificator 

# Dataset Configuration
dataset:
  # ID dataset settings
  id:
    source: "project-oceania/planktonzilla_only_plankton"  # HuggingFace path or local path
    split: "test"
    classes: null  # Optional: list of class names to keep, null means keep all
    samples_per_class: null  # Optional: samples per class, null means keep all
  
  # OOD dataset settings
  ood:
    source: "/home/svasquez/planktonzilla/planktonzilla_ood/data/planktonzilla_oods"  # HuggingFace path or local path
    split: "train"
    classes: null # Optional: list of class names to keep as OOD
    samples_per_class: null  # Optional: samples per class, null means keep all
  
  # Fitting dataset settings
  fit:
    source: "project-oceania/planktonzilla_only_plankton"  # HuggingFace path or local path
    split: "train"
    classes: null  # Optional: list of class names to keep, null means keep all
    samples_per_class: null  # Optional: samples per class, null means keep all

# DataLoader Configuration
dataloader:
  batch_size: 256  # Will be multiplied by GPU count
  num_workers: 4
  pin_memory: true

# OOD Methods Configuration
ood_methods:
  - name: "MSP"
    config:
      t: 1.0  # Temperature
  
  - name: "Energy"
    config:
      t: 1.0  # Temperature
  
  - name: "MaxLogit"
    config: {}
  
  - name: "KL-Matching"
    config: {}
  
  - name: "Mahalanobis"
    config:
      eps: 0.0  # Regularization epsilon
  
  - name: "React"
    config:
      threshold: 2.0  # Activation clipping threshold
  
  - name: "ViM"
    config:
      d: 512  # Principal component dimension

# Experiment Configuration
experiment:
  seed: 42
  name: "planktonzilla_ood_experiment"
  output_dir: "ood_results"
  save_results: true  # Whether to save results to disk
  save_fitted_params: planktonzilla_full_train
  load_fitted_params: null
# Advanced Settings
advanced:
  auto_scale_batch_size: true  # Automatically scale batch size based on GPU count
  memory_efficient: false  # Use gradient checkpointing (slower but less memory)
  mixed_precision: false  # Use automatic mixed precision (faster on modern GPUs)
