# @package _global_

# to execute this experiment run:
# python train.py experiment=example

defaults:
  - override /datamodule: ???
  - override /model: timm-resnet32.yaml
  - override /transformation: ???
  - override /augmentation: none.yaml
  - override /callbacks: default.yaml
  - override /trainer: default.yaml
  - override /logger: many_loggers.yaml

experiment_metadata:
  dataset: ${eval:'"${hydra:runtime.choices.datamodule}".replace(".yaml", "")'}
  model_name: ${eval:'"${hydra:runtime.choices.model}".replace(".yaml", "")'}
  loss: ${model.criterion._target_}
  augmentation_name: ${eval:'"${hydra:runtime.choices.augmentation}".replace(".yaml", "")'}
  sampler_type: ${datamodule.sampler_type}

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters
trainer:
  max_epochs: 200

find_optimal_batch_size: false
find_optimal_learning_rate: false
hgfc_hub_base_model_name: inria-chile/${model.net.model_name}_${eval:'"${hydra:runtime.choices.datamodule}".replace(".yaml", "")'}
pytorch_script_filename: ${model.net.model_name}_${eval:'"${hydra:runtime.choices.datamodule}".replace(".yaml", "")'}.script.pt


logger:
  wandb:
    tags: ${tags}
    project: none # to be set at runtime
    entity: oceania-plankton # set to name of your wandb team
    name: ${model.net.model_name}__${eval:'"${hydra:runtime.choices.datamodule}".replace(".yaml", "")'}
    log_model: false
