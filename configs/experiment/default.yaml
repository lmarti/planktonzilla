# @package _global_

# to execute this experiment run:
# python train.py experiment=example

defaults:
  - override /dataset: default.yaml
  - override /model: resnet18.yaml
  - override /augmentation: default.yaml
  - override /training_arguments: default.yaml
  - override /tracking: default.yaml

experiment_metadata:
  dataset: ${eval:'"${hydra:runtime.choices.dataset}"[0:-5]'}
  model_name: ${eval:'"${hydra:runtime.choices.model}"[0:-5]'}
  loss: ${model.criterion._target_}
  augmentation_name: ${eval:'"${hydra:runtime.choices.augmentation}"[0:-5]'}
  sampler_type: ${dataset.sampler_type}

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters
trainer:
  max_epochs: 200

find_optimal_batch_size: false
find_optimal_learning_rate: false
hgfc_hub_base_model_name: inria-chile/${model.net.model_name}_${eval:'"${hydra:runtime.choices.dataset}"[0:-5]'}
pytorch_script_filename: ${model.net.model_name}_${eval:'"${hydra:runtime.choices.dataset}"[0:-5]'}.script.pt


logger:
  wandb:
    tags: ${tags}
    project: none # to be set at runtime
    entity: oceania-plankton # set to name of your wandb team
    name: ${model.net.model_name}__${eval:'"${hydra:runtime.choices.dataset}"[0:-5]'}
    log_model: false
