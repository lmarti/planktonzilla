# @package _global_

# to execute this experiment run:
# python train.py experiment=base_zoolake model=...
defaults:
  - default.yaml
  - override /dataset: inaturalist.yaml
  - override /augmentation: inaturalist.yaml


model:
  optimizer:
    _target_: torch.optim.SGD
    _partial_: true
    weight_decay: 0.0002
    momentum: 0.9
  scheduler:
    _target_: deep_plankton.scheduler.CustomLRScheduler
    _partial_: True
    warmup_epochs: 5
    decay_epochs: 60
    stop_decay: 80
    decay_rate: 0.01 
