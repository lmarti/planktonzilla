augmentation:
  _target_: albumentations.Compose
  transforms:
    - _target_: albumentations.HorizontalFlip
      p: 0.5
    - _target_: albumentations.Perspective
      p: 0.5
    - _target_: albumentations.ColorJitter
      brightness: [0.8, 1.2]
      contrast: [1, 1]
      saturation: [1, 1]
      hue: [0, 0]
      p: 0.5
    - _target_: albumentations.ToTensorV2

