_target_: planktonzilla.dataset_import.dataset_importer.ISIISNetDatasetImporter
hf_dataset_name: isiisnet
push_to_hub: true

human_readable_name: "ISIISNet: plankton images captured with the ISIIS (In-situ Ichthyoplankton Imaging System)"
license: cc-by-nc-4.0
description: |
  Plankton was imaged with an In Situ Ichthyoplankton Imaging System, between surface and ~100m, over 10 days
  in July 2016, in the North Western Mediterranean Sea. This deployment was the core of the VISUFRONT cruise.
  The image generated by the linescan, shadowgraph camera of ISIIS were processed with the custom software apeep
  and regions of interest, targeted to be planktonic organisms by a deep segmenter, were extracted. The 408,166
  resulting objects were sorted by a limited number of operators, following a common taxonomic guide, into 32
  taxa, using the web application EcoTaxa http://ecotaxa.obs-vlfr.fr. For the purpose of training machine learning
  classifiers, the images in each class were split into training, validation, and test sets, with proportions 70%,
  15% and 15%.

