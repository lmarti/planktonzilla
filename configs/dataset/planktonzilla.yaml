defaults:
  - default.yaml

name: project-oceania/planktonzilla_only_plankton

transform:
  _target_: torchvision.transforms.v2.Compose
  transforms:
    - _target_: torchvision.transforms.v2.ToTensor
    # the actual sizes are set at training time depending on the model
    - _target_: torchvision.transforms.v2.Resize
      size:
        - ${img_size}
        - ${img_size}
      antialias: true
    - _target_: torchvision.transforms.v2.Normalize
      mean: [0.481, 0.458, 0.408]
      std: [0.269, 0.261, 0.276]

